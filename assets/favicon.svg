<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Grand G navy (arc gauche + barre horizontale) -->
  <!-- Arc du G : cercle centre (26,32) r=22, on trace 3/4 de cercle -->
  <path d="M 26 10
             A 22 22 0 1 0 26 54"
        fill="none" stroke="#0D1B2A" stroke-width="10" stroke-linecap="butt"/>

  <!-- Barre horizontale du G -->
  <rect x="26" y="24" width="22" height="9" fill="#0D1B2A"/>

  <!-- Segment bas du G (orange, comme sur le logo) -->
  <rect x="36" y="33" width="12" height="10" fill="#E8630A"/>

  <!-- Maison à l'intérieur du G -->
  <!-- Toit (triangle) -->
  <polygon points="26,26  19,32  33,32" fill="#E8630A"/>
  <!-- Ligne de toit double (style du logo) -->
  <line x1="19" y1="30.5" x2="33" y2="30.5" stroke="#E8630A" stroke-width="1.2" opacity="0.6"/>
  <!-- Corps de la maison -->
  <rect x="21" y="32" width="12" height="9" fill="#0D1B2A" opacity="0.85"/>
  <!-- Fenêtre de la maison -->
  <rect x="24" y="33.5" width="6" height="5" fill="#E8630A" opacity="0.9"/>

</svg>
